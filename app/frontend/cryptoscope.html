const LANG_LABELS = { en: "EN", zh: "中文", es: "ES" };

const LangCtx = createContext();
function LangProvider({ children }) {
  const [locale, setLocale] = useState("en");
  useEffect(() => { try { const s = localStorage.getItem("cs_lang"); if (s) setLocale(s); } catch(e){} }, []);
  const setLang = (l) => { setLocale(l); try { localStorage.setItem("cs_lang", l); } catch(e){} };
  const t = useCallback((k) => TRANSLATIONS[locale]?.[k] || TRANSLATIONS.en[k] || k, [locale]);
  return <LangCtx.Provider value={{ locale, setLang, t }}>{children}</LangCtx.Provider>;
}
function useLang() { return useContext(LangCtx); }

// =============================================
// Mock Data
// =============================================
const COINS = {
  BTC: { name: "Bitcoin", color: "#F7931A", icon: "B" },
  ETH: { name: "Ethereum", color: "#627EEA", icon: "E" },
  SOL: { name: "Solana", color: "#9945FF", icon: "S" },
};

function genHistory(base, days, vol) {
  days = days || 365; vol = vol || 0.03;
  const d = []; let p = base; const now = Date.now();
  for (let i = days; i >= 0; i--) {
    const dt = new Date(now - i * 86400000);
    const trend = Math.sin(i / 60) * base * 0.15;
    p = Math.max(p * 0.5, p + (Math.random() - 0.48) * base * vol + trend * 0.01);
    const volume = base * 1e6 * (0.5 + Math.random());
    const mcap = p * (base > 10000 ? 19.5e6 : base > 500 ? 120e6 : 4e8);
    d.push({ date: dt.toISOString().split("T")[0], price: Math.round(p * 100) / 100, volume: Math.round(volume), marketCap: Math.round(mcap) });
  }
  return d;
}

function addIndicators(hist) {
  const prices = hist.map(d => d.price);
  return hist.map((d, i) => {
    const sma20w = prices.slice(Math.max(0, i - 19), i + 1);
    const sma20 = sma20w.reduce((a, b) => a + b, 0) / sma20w.length;
    const sma50w = prices.slice(Math.max(0, i - 49), i + 1);
    const sma50 = sma50w.reduce((a, b) => a + b, 0) / sma50w.length;
    const k12 = 2 / 13, k26 = 2 / 27;
    let ema12 = prices[0], ema26 = prices[0];
    for (let j = 1; j <= i; j++) { ema12 = prices[j] * k12 + ema12 * (1 - k12); ema26 = prices[j] * k26 + ema26 * (1 - k26); }
    const macdLine = ema12 - ema26;
    const macdSignal = macdLine * 0.8;
    const macdHistogram = macdLine - macdSignal;
    let rsi = 50;
    if (i >= 14) {
      let g = 0, l = 0;
      for (let j = i - 13; j <= i; j++) { const diff = prices[j] - prices[j - 1]; if (diff > 0) g += diff; else l -= diff; }
      rsi = l === 0 ? 100 : 100 - 100 / (1 + g / l);
    }
    const bbStd = Math.sqrt(sma20w.reduce((s, p) => s + (p - sma20) ** 2, 0) / sma20w.length);
    const dailyReturn = i > 0 ? (prices[i] - prices[i - 1]) / prices[i - 1] : 0;
    return { ...d, sma20: +sma20.toFixed(2), sma50: +sma50.toFixed(2), rsi: +rsi.toFixed(1), macdLine: +macdLine.toFixed(2), macdSignal: +macdSignal.toFixed(2), macdHistogram: +macdHistogram.toFixed(2), bbUpper: +(sma20 + 2 * bbStd).toFixed(2), bbMiddle: +sma20.toFixed(2), bbLower: +(sma20 - 2 * bbStd).toFixed(2), dailyReturn: +dailyReturn.toFixed(4) };
  });
}

const DATA = {

function getSnap(sym) {
  const d = DATA[sym]; if (!d || !d.length) return null;
  const latest = d[d.length - 1], prev = d[d.length - 2] || latest;
  const change24h = (latest.price - prev.price) / prev.price;

const fmtUSD = (v) => v == null ? "—" : "$" + v.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtCompact = (v) => { if (v == null) return "—"; if (v >= 1e12) return "$" + (v / 1e12).toFixed(2) + "T"; if (v >= 1e9) return "$" + (v / 1e9).toFixed(2) + "B"; if (v >= 1e6) return "$" + (v / 1e6).toFixed(1) + "M"; return fmtUSD(v); };
const fmtPct = (v) => v == null ? "—" : (v >= 0 ? "+" : "") + (v * 100).toFixed(2) + "%";
const fmtNum = (v) => v == null ? "—" : v.toLocaleString("en-US");
const fmtDate = (s) => { const d = new Date(s); return d.toLocaleDateString("en-US", { month: "short", day: "numeric" }); };

function genSignals(s) {
  if (!s) return []; const sigs = [];
  if (s.rsi < 30) sigs.push({ type: "rsi", dir: "bullish", key: "insights.signal_oversold_buy" });
  else if (s.rsi > 70) sigs.push({ type: "rsi", dir: "bearish", key: "insights.signal_overbought_sell" });
  if (s.price < s.sma20) sigs.push({ type: "trend", dir: "bearish", key: "insights.signal_downtrend" });
  else sigs.push({ type: "trend", dir: "bullish", key: "insights.signal_uptrend" });
  if (s.macdLine > s.macdSignal) sigs.push({ type: "macd", dir: "bullish", key: "insights.signal_macd_bullish" });
  else sigs.push({ type: "macd", dir: "bearish", key: "insights.signal_macd_bearish" });
  if (!sigs.length) sigs.push({ type: "neutral", dir: "neutral", key: "insights.signal_neutral" });
  return sigs;
}

function overallDir(sigs) {
  let score = 0; sigs.forEach(s => { if (s.dir === "bullish") score++; if (s.dir === "bearish") score--; });
  return score > 0 ? "bullish" : score < 0 ? "bearish" : "neutral";
}

function computeSentiment(snaps) {
  if (!snaps.length) return { score: 50, label: "neutral", color: "var(--yellow)" };
  const avgRSI = snaps.reduce((s, c) => s + (c.rsi || 50), 0) / snaps.length;
  const avgCh = snaps.reduce((s, c) => s + (c.change24h || 0), 0) / snaps.length;
  const chScore = Math.min(100, Math.max(0, (avgCh + 0.1) * 500));
  const score = Math.round(Math.min(100, Math.max(0, avgRSI * 0.6 + chScore * 0.4)));
  if (score < 30) return { score, label: "fear", color: "var(--red)" };
  if (score < 70) return { score, label: "neutral", color: "var(--yellow)" };
  return { score, label: "greed", color: "var(--green)" };
}

function predict(s) {
  if (!s) return { dir: "up", prob: 50, conf: "LOW" };
  let bp = 0, tp = 0;
  if (s.rsi != null) { tp += 2; if (s.rsi < 30) bp += 2; else if (s.rsi < 50) bp += 1; else if (s.rsi < 70) bp += 1.5; }
  if (s.price != null && s.sma20 != null) { tp += 2; if (s.price > s.sma20) bp += 2; else if (s.price > s.sma20 * 0.98) bp += 1; }
  if (s.macdHistogram != null) { tp += 1.5; if (s.macdHistogram > 0) bp += 1.5; else if (s.macdHistogram > -100) bp += 0.5; }
  const raw = tp > 0 ? (bp / tp) * 100 : 50;
  const prob = Math.round(Math.min(95, Math.max(5, raw)));
  const dir = prob >= 50 ? "up" : "down";
  const dp = dir === "up" ? prob : 100 - prob;
  const spread = Math.abs(prob - 50);
  const conf = spread > 25 ? "HIGH" : spread > 10 ? "MED" : "LOW";
  return { dir, prob: dp, conf };
}

// SVG Line Chart Component
// =============================================
function SVGChart({ data, lines, width, height, yDomain, refLines, showGrid }) {
  width = width || 800; height = height || 350;
  if (!data || !data.length || !lines || !lines.length) return <div className="card" style={{height: height, display:"flex", alignItems:"center", justifyContent:"center", color:"var(--text-3)"}}>No data</div>;

  const pad = { top: 20, right: 16, bottom: 40, left: 70 };
  const w = width - pad.left - pad.right;
  const h = height - pad.top - pad.bottom;

  // compute Y range across all lines
  let yMin = Infinity, yMax = -Infinity;
  if (yDomain) {
    yMin = yDomain[0]; yMax = yDomain[1];
  } else {
    lines.forEach(line => {
      data.forEach(d => {
        const v = d[line.key];
        if (v != null && isFinite(v)) { if (v < yMin) yMin = v; if (v > yMax) yMax = v; }
      });
    });
    const margin = (yMax - yMin) * 0.05 || 1;
    yMin -= margin; yMax += margin;
  }

  const xScale = (i) => pad.left + (i / (data.length - 1)) * w;
  const yScale = (v) => pad.top + h - ((v - yMin) / (yMax - yMin)) * h;

  // build polyline paths
  const paths = lines.map(line => {
    const pts = [];
    data.forEach((d, i) => {
      const v = d[line.key];
      if (v != null && isFinite(v)) pts.push(xScale(i) + "," + yScale(v));
    });
    return { ...line, d: "M" + pts.join("L") };
  });

  // X axis labels (show ~8 labels)
  const step = Math.max(1, Math.floor(data.length / 8));
  const xLabels = [];
  for (let i = 0; i < data.length; i += step) {
    xLabels.push({ x: xScale(i), label: fmtDate(data[i].date) });
  }

  // Y axis labels (5 ticks)
  const yLabels = [];
  for (let i = 0; i <= 4; i++) {
    const v = yMin + (yMax - yMin) * (i / 4);
    yLabels.push({ y: yScale(v), label: v > 1000 ? fmtCompact(v) : v.toFixed(1) });
  }

  const [tooltip, setTooltip] = useState(null);

  return (
    <div className="chart-container" style={{position:"relative"}}>
      <svg viewBox={"0 0 " + width + " " + height} style={{width:"100%", height:"auto"}}>
        {/* Grid lines */}
        {showGrid !== false && yLabels.map((yl, i) => (
          <line key={"g"+i} x1={pad.left} x2={width - pad.right} y1={yl.y} y2={yl.y} stroke="var(--bg-border)" strokeWidth="1" />
        ))}

        {/* Reference lines */}
        {refLines && refLines.map((rl, i) => (
          <g key={"ref"+i}>
            <line x1={pad.left} x2={width - pad.right} y1={yScale(rl.y)} y2={yScale(rl.y)} stroke={rl.color} strokeWidth="1" strokeDasharray="4 4" />
            <text x={width - pad.right + 4} y={yScale(rl.y) + 4} fill={rl.color} fontSize="10">{rl.label}</text>
          </g>
        ))}

        {/* Data lines */}
        {paths.map((p, i) => (
          <path key={i} d={p.d} fill="none" stroke={p.color} strokeWidth={p.width || 2} strokeDasharray={p.dash || "none"} opacity={p.opacity || 1} />
        ))}

        {/* X axis */}
        {xLabels.map((xl, i) => (
          <text key={"x"+i} x={xl.x} y={height - 8} fill="var(--text-3)" fontSize="10" textAnchor="middle">{xl.label}</text>
        ))}

        {/* Y axis */}
        {yLabels.map((yl, i) => (
          <text key={"y"+i} x={pad.left - 8} y={yl.y + 4} fill="var(--text-3)" fontSize="10" textAnchor="end">{yl.label}</text>
        ))}

        {/* Hover overlay */}
        <rect x={pad.left} y={pad.top} width={w} height={h} fill="transparent"
          onMouseMove={(e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const mx = (e.clientX - rect.left) / rect.width;
            const idx = Math.round(mx * (data.length - 1));
            if (idx >= 0 && idx < data.length) {
              setTooltip({ idx, x: xScale(idx), y: pad.top });
            }
          }}
          onMouseLeave={() => setTooltip(null)}
        />

        {/* Tooltip crosshair */}
        {tooltip && (
          <line x1={tooltip.x} x2={tooltip.x} y1={pad.top} y2={pad.top + h} stroke="var(--text-3)" strokeWidth="1" strokeDasharray="3 3" opacity="0.5" />
        )}
      </svg>

      {/* Tooltip box */}
      {tooltip && data[tooltip.idx] && (
        <div style={{
          position: "absolute", top: 10, right: 10, background: "var(--bg-card)", border: "1px solid var(--bg-border)",
          borderRadius: 8, padding: "8px 12px", fontSize: 12, pointerEvents: "none", zIndex: 10
        }}>
          <div style={{ color: "var(--text-3)", marginBottom: 4 }}>{data[tooltip.idx].date}</div>
          {lines.map((line, i) => {
            const v = data[tooltip.idx][line.key];
            return v != null ? (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ width: 6, height: 6, borderRadius: 3, background: line.color, display: "inline-block" }} />
                <span style={{ color: "var(--text-2)" }}>{line.name || line.key}:</span>
                <span style={{ fontWeight: 600 }}>{v > 1000 ? fmtUSD(v) : v.toFixed(2)}</span>
              </div>
            ) : null;
          })}
        </div>
      )}

      {/* Legend */}
      <div style={{ display: "flex", gap: 16, justifyContent: "center", marginTop: 8, flexWrap: "wrap" }}>
        {lines.map((line, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: "var(--text-2)" }}>
            <span style={{ width: 12, height: 2, background: line.color, display: "inline-block", borderRadius: 1 }} />
            {line.name || line.key}
          </div>
        ))}
      </div>
    </div>
  );
}

          { key: "sma50", color: "#5e6673", name: "SMA(50)", dash: "5 5", width: 1 },
        ]} height={380} />
      </div>

      <div className="section-title">{coin} — RSI (14)</div>
      <div className="card" style={{ padding: "16px 8px", marginBottom: 24 }}>
        <SVGChart data={h} lines={[
          { key: "rsi", color: "#e94560", name: "RSI(14)" },
        ]} height={260} yDomain={[0, 100]} refLines={[
          { y: 70, color: "var(--red)", label: "70" },
          { y: 30, color: "var(--green)", label: "30" },
        ]} />
      </div>

      <div className="section-title">{coin} — Bollinger Bands</div>
      <div className="card" style={{ padding: "16px 8px" }}>
        <SVGChart data={h} lines={[
          { key: "bbUpper", color: "rgba(98,126,234,0.5)", name: "BB Upper", width: 1, dash: "3 3" },
          { key: "bbLower", color: "rgba(98,126,234,0.5)", name: "BB Lower", width: 1, dash: "3 3" },
          { key: "bbMiddle", color: "#627EEA", name: "SMA(20)", width: 1, dash: "5 5" },
          { key: "price", color: clr, name: "Price" },
        ]} height={380} />
      </div>
    </div>
  );
}

function InsightsPage({ coins }) {
  const { t } = useLang();
  const snaps = coins.map(getSnap).filter(Boolean);
  const [coin, setCoin] = useState(coins[0]);
  const snap = snaps.find(s => s.symbol === coin);
  return (
    <div>
      <div className="grid-3">
        <MarketSentiment snapshots={snaps} />
        <div style={{ gridColumn: "span 2" }}><div className="grid-2" style={{ marginBottom: 0 }}>{snaps.slice(0, 2).map(s => <AIInsightCard key={s.symbol} symbol={s.symbol} snap={s} />)}</div></div>
      </div>
      <div className="pill-group" style={{ marginBottom: 24 }}><span style={{ fontSize: 12, color: "var(--text-3)", marginRight: 8 }}>Deep dive:</span>{coins.map(c => <button key={c} className={"pill-sm " + (coin === c ? "active" : "")} onClick={() => setCoin(c)}><span style={{ display: "inline-block", width: 6, height: 6, borderRadius: 3, background: COINS[c]?.color, marginRight: 6 }} />{c}</button>)}</div>
      <div className="grid-2"><PredictionCard symbol={coin} snap={snap} /><AIInsightCard symbol={coin} snap={snap} /></div>
      <OnChainPanel symbol={coin} />
    </div>
  );
}

function DataPage({ coins, days }) {
  const { t } = useLang();
  const [coin, setCoin] = useState(coins[0]);
  const h = days ? (DATA[coin] || []).slice(-days) : (DATA[coin] || []);
  const cols = h.length ? Object.keys(h[0]) : [];
  const defCols = ["date", "price", "volume", "rsi", "macdLine", "dailyReturn"];
  const [vis, setVis] = useState(cols.filter(c => defCols.includes(c)));
  const toggle = c => setVis(v => v.includes(c) ? v.filter(x => x !== c) : [...v, c]);
  const dl = () => {
    const hdr = vis.join(",");
    const rows = h.map(r => vis.map(c => r[c] != null ? r[c] : "").join(","));
    const csv = [hdr, ...rows].join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = coin.toLowerCase() + "_data.csv"; a.click();
    URL.revokeObjectURL(url);
  };
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div className="pill-group">{coins.map(c => <button key={c} className={"pill-sm " + (coin === c ? "active" : "")} onClick={() => setCoin(c)}>{c}</button>)}</div>
        <button className="btn-primary" onClick={dl}>⬇ {t("data.download")}</button>
      </div>
      <div style={{ fontSize: 11, color: "var(--text-3)", marginBottom: 8 }}>{t("data.columns")}</div>
      <div className="col-tags">{cols.map(c => <button key={c} className={"col-tag " + (vis.includes(c) ? "on" : "off")} onClick={() => toggle(c)}>{c}</button>)}</div>
      <div className="card" style={{ padding: 0, overflow: "hidden" }}>
        <div className="data-table-wrap">
          <table><thead><tr>{vis.map(c => <th key={c}>{c}</th>)}</tr></thead>
          <tbody>{h.slice().reverse().slice(0, 200).map((r, i) => <tr key={i}>{vis.map(c => <td key={c} className="font-mono" style={{ fontSize: 11 }}>{typeof r[c] === "number" ? (r[c] > 1000 ? r[c].toLocaleString("en-US", { maximumFractionDigits: 2 }) : r[c].toFixed(4)) : r[c]}</td>)}</tr>)}</tbody></table>
        </div>
      </div>
      <div style={{ fontSize: 11, color: "var(--text-3)", marginTop: 8 }}>{h.length} {t("data.rows")}</div>
    </div>
  );
}

// =============================================
// App
// =============================================
function App() {
  const { t } = useLang();
  const [tab, setTab] = useState("markets");
  const [coins, setCoins] = useState(["BTC", "ETH", "SOL"]);
  const [timeKey, setTimeKey] = useState("all");
  const daysMap = { all: null, "30d": 30, "90d": 90, "180d": 180, "1y": 365 };
  const days = daysMap[timeKey];
  const toggleCoin = c => setCoins(prev => prev.includes(c) ? prev.filter(x => x !== c) : [...prev, c]);
  const tabs = [{ key: "markets", icon: "📊" }, { key: "technical", icon: "📈" }, { key: "insights", icon: "🤖" }, { key: "watchlist", icon: "⭐" }, { key: "data", icon: "🗂" }];
  const timeOpts = ["all", "30d", "90d", "180d", "1y"];
  return (
    <div>
      <header className="topbar"><div className="topbar-inner">
        <div className="brand"><span>📊</span> CryptoScope</div>
        <nav className="nav-pills">{tabs.map(({ key, icon }) => <button key={key} className={"nav-pill " + (tab === key ? "active" : "")} onClick={() => setTab(key)}>{icon} {t("nav." + key)}</button>)}</nav>
        <LanguageDropdown />
      </div></header>
      <div className="container controls">
        <div className="pill-group"><label>{t("common.assets")}:</label>{["BTC", "ETH", "SOL"].map(c => <button key={c} className={"pill-sm " + (coins.includes(c) ? "active" : "")} onClick={() => toggleCoin(c)}>{c}</button>)}</div>
        <div className="nav-pills" style={{ padding: 3 }}>{timeOpts.map(k => <button key={k} className={"nav-pill " + (timeKey === k ? "active" : "")} style={{ padding: "4px 10px", fontSize: 12 }} onClick={() => setTimeKey(k)}>{t("time." + k)}</button>)}</div>
      </div>
      <main className="container" style={{ paddingBottom: 48 }}>
        {tab === "markets" && <MarketsPage coins={coins} days={days} />}
        {tab === "technical" && <TechnicalPage coins={coins} days={days} />}
        {tab === "insights" && <InsightsPage coins={coins} />}
        {tab === "watchlist" && <WatchlistPanel />}
        {tab === "data" && <DataPage coins={coins} days={days} />}
      </main>
      <footer className="footer">CryptoScope · Built by Jason Feng · University of Utah · 2026</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LangProvider><App /></LangProvider>);
</script>
</body>
</html>
